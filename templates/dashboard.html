<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – FinTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #181818;
      --surface2: #222222;
      --border:   #2e2e2e;
      --ink:      #efefef;
      --muted:    #666;
      --green:    #4ade80;
      --green-dim:#16532d;
      --red:      #f87171;
      --red-dim:  #450a0a;
      --yellow:   #fbbf24;
      --radius:   8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
    }
    .nav-logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--green);
      letter-spacing: 2px;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-user {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .nav-user span { color: var(--ink); font-weight: 500; }
    .logout {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout:hover { border-color: var(--red); color: var(--red); }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── STATS ROW ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
      animation: fadeUp 0.35s ease both;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-card .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .stat-card .value {
      font-family: 'DM Mono', monospace;
      font-size: 1.7rem;
      color: var(--green);
      margin-top: 6px;
      line-height: 1;
    }

    /* ── MAIN GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 20px;
      align-items: start;
      animation: fadeUp 0.4s ease 0.05s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .card-body { padding: 20px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 13px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.07);
    }
    input::placeholder { color: #383838; }
    select option { background: #1a1a1a; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--green); color: #0a0a0a; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 8px;
    }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }
    .btn:hover { opacity: 0.85; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* MSG */
    .msg {
      font-size: 0.8rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      display: none;
    }
    .msg.success { background: var(--green-dim); color: var(--green); border: 1px solid #166534; display: block; }
    .msg.error   { background: var(--red-dim);   color: var(--red);   border: 1px solid #7f1d1d; display: block; }

    /* ── EXPENSE LIST ── */
    .expense-list { display: flex; flex-direction: column; }

    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-item:hover { background: rgba(255,255,255,0.02); }

    .exp-left .exp-desc {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink);
    }
    .exp-left .exp-meta {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 8px;
    }
    .exp-meta .cat-badge {
      color: var(--yellow);
    }

    .exp-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .exp-amount {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      color: var(--green);
    }
    .del-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .del-btn:hover { background: var(--red-dim); color: var(--red); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 10px; display: block; }

    /* filter bar */
    .filter-bar {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-bar select {
      width: auto;
      padding: 5px 10px;
      font-size: 0.8rem;
    }
    .filter-bar label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    @media (max-width: 680px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat-card:last-child { grid-column: 1/-1; }
      .grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">◈ FINTRACK</div>
  <div class="nav-right">
    <div class="nav-user">logged in as <span id="navUsername">—</span></div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Spent</div>
      <div class="value" id="statTotal">₹0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">This Month</div>
      <div class="value" id="statMonth">₹0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Transactions</div>
      <div class="value" id="statCount">0</div>
    </div>
  </div>

  <div class="grid">

    <!-- LEFT COLUMN: ADD EXPENSE + ADD CATEGORY -->
    <div style="display:flex; flex-direction:column; gap:16px;">

      <!-- Add Expense -->
      <div class="card">
        <div class="card-header"><h2>Add Expense</h2></div>
        <div class="card-body">
          <div id="expMsg" class="msg"></div>

          <div class="field">
            <label>Category</label>
            <select id="catSelect">
              <option value="">Loading categories...</option>
            </select>
          </div>
          <div class="field">
            <label>Amount (₹)</label>
            <input id="amount" type="number" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="field">
            <label>Date</label>
            <input id="expDate" type="date" />
          </div>
          <div class="field">
            <label>Description</label>
            <input id="description" type="text" placeholder="what was this for?" />
          </div>
          <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
        </div>
      </div>

      <!-- Add Category -->
      <div class="card">
        <div class="card-header"><h2>Add Category</h2></div>
        <div class="card-body">
          <div id="catMsg" class="msg"></div>
          <div class="field">
            <label>Category Name</label>
            <input id="catName" type="text" placeholder="e.g. Food, Transport, Rent..." />
          </div>
          <button class="btn btn-outline" onclick="addCategory()">+ Add Category</button>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN: EXPENSE TABLE -->
    <div class="card">
      <div class="card-header">
        <h2>My Expenses</h2>
      </div>
      <div class="filter-bar">
        <label>Filter:</label>
        <select id="filterCat" onchange="renderExpenses()">
          <option value="">All Categories</option>
        </select>
        <select id="filterMonth" onchange="renderExpenses()">
          <option value="">All Time</option>
        </select>
      </div>
      <div class="expense-list" id="expenseList">
        <div class="empty-state">
          <span class="icon">📭</span>
          No expenses yet. Add one!
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:5000';

  // ── AUTH CHECK ────────────────────────────────────────────
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'index.html';

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    };
  }

  // Decode username from JWT payload
  function getUsername() {
    try {
      return JSON.parse(atob(token.split('.')[1])).sub || 'user';
    } catch { return 'user'; }
  }
  document.getElementById('navUsername').textContent = getUsername();

  // Set today as default date
  document.getElementById('expDate').value = new Date().toISOString().split('T')[0];

  // ── MESSAGES ──────────────────────────────────────────────
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
    setTimeout(() => el.className = 'msg', 3000);
  }

  // ── ALL EXPENSES (stored locally after fetch) ─────────────
  let allExpenses = [];

  // ── LOAD CATEGORIES ───────────────────────────────────────
  async function loadCategories() {
    try {
      const res  = await fetch(API + '/categories', { headers: authHeaders() });
      const cats = await res.json();

      // main select
      const sel = document.getElementById('catSelect');
      sel.innerHTML = '<option value="">Select a category</option>';
      cats.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id; o.textContent = c.name;
        sel.appendChild(o);
      });

      // filter select
      const fsel = document.getElementById('filterCat');
      fsel.innerHTML = '<option value="">All Categories</option>';
      cats.forEach(c => {
        const o = document.createElement('option');
        o.value = c.name; o.textContent = c.name;
        fsel.appendChild(o);
      });
    } catch (err) {
      console.error('Could not load categories', err);
    }
  }

  // ── ADD CATEGORY ──────────────────────────────────────────
  async function addCategory() {
    const name = document.getElementById('catName').value.trim();
    if (!name) return showMsg('catMsg', 'Enter a category name.', 'error');

    try {
      const res  = await fetch(API + '/categories', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('catName').value = '';
        showMsg('catMsg', 'Category added!', 'success');
        loadCategories();
      } else {
        showMsg('catMsg', data.message, 'error');
      }
    } catch (err) {
      showMsg('catMsg', 'Server error.', 'error');
    }
  }

  // ── LOAD EXPENSES ─────────────────────────────────────────
  async function loadExpenses() {
    try {
      const res = await fetch(API + '/expenses', { headers: authHeaders() });
      allExpenses = await res.json();
      updateStats(allExpenses);
      buildMonthFilter(allExpenses);
      renderExpenses();
    } catch (err) {
      console.error('Could not load expenses', err);
    }
  }

  // ── MONTH FILTER OPTIONS ──────────────────────────────────
  function buildMonthFilter(expenses) {
    const months = [...new Set(expenses.map(e => e.date.slice(0, 7)))].sort().reverse();
    const sel = document.getElementById('filterMonth');
    sel.innerHTML = '<option value="">All Time</option>';
    months.forEach(m => {
      const o = document.createElement('option');
      o.value = m;
      // format "2025-06" → "Jun 2025"
      const [y, mo] = m.split('-');
      o.textContent = new Date(y, mo - 1).toLocaleString('default', { month: 'short', year: 'numeric' });
      sel.appendChild(o);
    });
  }

  // ── RENDER EXPENSES (with filters) ───────────────────────
  function renderExpenses() {
    const catFilter   = document.getElementById('filterCat').value;
    const monthFilter = document.getElementById('filterMonth').value;

    let filtered = allExpenses;
    if (catFilter)   filtered = filtered.filter(e => e.category === catFilter);
    if (monthFilter) filtered = filtered.filter(e => e.date.startsWith(monthFilter));

    const list = document.getElementById('expenseList');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="icon">📭</span>
          No expenses found.
        </div>`;
      return;
    }

    // sort newest first
    filtered = [...filtered].sort((a, b) => b.date.localeCompare(a.date));

    list.innerHTML = '';
    filtered.forEach(exp => {
      const item = document.createElement('div');
      item.className = 'expense-item';
      item.innerHTML = `
        <div class="exp-left">
          <div class="exp-desc">${exp.description || '(no description)'}</div>
          <div class="exp-meta">
            <span class="cat-badge">${exp.category}</span>
            <span>${formatDate(exp.date)}</span>
          </div>
        </div>
        <div class="exp-right">
          <span class="exp-amount">₹${parseFloat(exp.amount).toFixed(2)}</span>
          <button class="del-btn" onclick="deleteExpense(${exp.id})" title="Delete">✕</button>
        </div>
      `;
      list.appendChild(item);
    });
  }

  // ── UPDATE STATS ──────────────────────────────────────────
  function updateStats(expenses) {
    const total = expenses.reduce((s, e) => s + e.amount, 0);

    const thisMonth = new Date().toISOString().slice(0, 7);
    const monthly   = expenses
      .filter(e => e.date.startsWith(thisMonth))
      .reduce((s, e) => s + e.amount, 0);

    document.getElementById('statTotal').textContent = '₹' + total.toFixed(2);
    document.getElementById('statMonth').textContent = '₹' + monthly.toFixed(2);
    document.getElementById('statCount').textContent = expenses.length;
  }

  // ── ADD EXPENSE ───────────────────────────────────────────
  async function addExpense() {
    const category_id = document.getElementById('catSelect').value;
    const amount      = document.getElementById('amount').value;
    const date        = document.getElementById('expDate').value;
    const description = document.getElementById('description').value.trim();

    if (!category_id) return showMsg('expMsg', 'Please select a category.', 'error');
    if (!amount)      return showMsg('expMsg', 'Please enter an amount.', 'error');
    if (!date)        return showMsg('expMsg', 'Please pick a date.', 'error');

    try {
      const res  = await fetch(API + '/expenses', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ category_id: parseInt(category_id), amount: parseFloat(amount), date, description })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('amount').value      = '';
        document.getElementById('description').value = '';
        showMsg('expMsg', 'Expense added!', 'success');
        loadExpenses();
      } else {
        showMsg('expMsg', data.message, 'error');
      }
    } catch (err) {
      showMsg('expMsg', 'Server error.', 'error');
    }
  }

  // ── DELETE EXPENSE ────────────────────────────────────────
  async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;

    try {
      const res = await fetch(API + '/expenses/' + id, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (res.ok) loadExpenses();
    } catch (err) {
      alert('Could not delete expense.');
    }
  }

  // ── LOGOUT ────────────────────────────────────────────────
  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  }

  // ── HELPERS ───────────────────────────────────────────────
  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return new Date(y, m - 1, day).toLocaleDateString('default', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── INIT ──────────────────────────────────────────────────
  loadCategories();
  loadExpenses();
</script>

</body>
</html>
